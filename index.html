<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赞助支持</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
        :root {
            --primary: #f59e0b;
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --hover-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --surface-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: rgba(0, 0, 0, 0.8);
            --text-muted: rgba(0, 0, 0, 0.6);
            --border-color: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background-color: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
            color: rgba(0, 0, 0, 0.7);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            background-color: var(--hover-bg);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
        }

        /* Section */
        .section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        /* Intro */
        .intro-text {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .intro-subtext {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Payment Grid */
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 640px) {
            .payment-grid {
                grid-template-columns: 1fr;
            }
        }

        .payment-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .payment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .payment-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .payment-icon.alipay {
            background-color: #1677ff;
        }

        .payment-icon.wechat {
            background-color: #07c160;
        }

        .payment-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .payment-info h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .payment-info p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .payment-qr {
            width: 192px;
            height: 192px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: white;
        }

        .payment-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Support Options */
        .support-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .support-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        .support-item:last-child {
            border-bottom: none;
        }

        .support-item:hover {
            background-color: var(--hover-bg);
            border-radius: 8px;
        }

        .support-icon {
            width: 24px;
            height: 24px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .support-content h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .support-content p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Sponsor List */
        .sponsor-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .sponsor-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        .sponsor-item:last-child {
            border-bottom: none;
        }

        .sponsor-item:hover {
            background-color: var(--hover-bg);
            border-radius: 8px;
        }

        .sponsor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sponsor-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sponsor-avatar .default-avatar {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
        }

        .sponsor-info {
            flex: 1;
            min-width: 0;
        }

        .sponsor-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sponsor-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .sponsor-url {
            font-size: 0.7rem;
        }

        .sponsor-url a {
            color: var(--accent-color);
            text-decoration: none;
            word-break: break-all;
        }

        .sponsor-url a:hover {
            text-decoration: underline;
        }

        .sponsor-amount {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--primary);
            flex-shrink: 0;
        }

        /* Link Submit Info */
        .link-submit-info {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .link-submit-info a {
            color: var(--primary);
            text-decoration: underline;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .link-submit-info a:hover {
            opacity: 0.8;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 32px;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <!-- 月亮图标 - 深色模式 -->
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3h.393a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 2.992z"/>
        </svg>
        <!-- 太阳图标 - 浅色模式 -->
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" style="display: none;">
            <path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0-8 0m-5 0h1m8-9v1m8 8h1m-9 8v1M5.6 5.6l.7.7m12.1-.7l-.7.7m0 11.4l.7.7m-12.1-.7l-.7.7"/>
        </svg>
    </button>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h1>赞助支持</h1>
        </div>

        <!-- Intro Section -->
        <div class="section">
            <p class="intro-text">如果您觉得我的内容对您有帮助，欢迎通过以下方式支持我的创作。您的每一份支持都是我持续创作的动力！</p>
            <p class="intro-subtext">所有赞助将用于网站维护、服务器费用以及内容创作。</p>
        </div>

        <!-- Payment Section -->
        <div class="section">
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
                支付方式
            </h2>
            <div class="payment-grid">
                <!-- Alipay -->
                <div class="payment-item">
                    <div class="payment-header">
                        <div class="payment-icon alipay">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 48 48"><path fill="#ffffff" d="M24 0c13.255 0 24 10.745 24 24S37.255 48 24 48S0 37.255 0 24S10.745 0 24 0m0 4.364C13.155 4.364 4.364 13.155 4.364 24S13.155 43.636 24 43.636c6.738 0 12.683-3.393 16.22-8.565a64 64 0 0 1-6.683-2.402q-1.855-.78-5.541-2.459C25.056 33.173 20.769 36 16.174 36c-3.188-.016-8.538-1.627-8.538-6.654s4.956-6.224 8.172-6.224q2.919 0 10.33 3.222l.077.03q1.989-2.434 2.73-5.653l.1-.464h-12.87v-2.32h5.857v-2.9h-8.201v-1.74h8.201l.001-3.479h4.687v3.48h9.374v1.74H26.72v2.899h7.486q-.165 1.086-.371 1.973l-.084.347q-.517 1.868-2.325 5.442c-.32.632-.782 1.364-1.366 2.139q2.766 1.024 5.6 1.99q3.67 1.249 6.345 2.02A19.6 19.6 0 0 0 43.636 24c0-10.845-8.791-19.636-19.636-19.636m-13.685 24.18c0 3.198 6.69 4.472 12.11 1.106q.915-.57 1.71-1.213l-.018-.008l-.427-.262q-5.074-3.087-7.882-3.348c-1.719-.159-5.493.527-5.493 3.725m18.73-8.287h2.209z"/></svg>
                        </div>
                        <div class="payment-info">
                            <h3>支付宝</h3>
                            <p>扫码支付</p>
                        </div>
                    </div>
                    <div class="payment-qr">
                        <img src="images/alipay.avif" alt="支付宝二维码">
                    </div>
                </div>

                <!-- WeChat -->
                <div class="payment-item">
                    <div class="payment-header">
                        <div class="payment-icon wechat">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="#ffffff" stroke-linejoin="round"><path stroke-linecap="round" stroke-width="2" d="M7 7h.009m5.982 0H13m4.991 7.5H18m-4 0h.009"/><path stroke-width="1.5" d="M10 16c0 2.761 2.686 5 6 5c.907 0 1.767-.168 2.538-.468c.189-.073.393-.1.592-.063L22 21l-.652-2.03a1.13 1.13 0 0 1 .11-.89A4.3 4.3 0 0 0 22 16c0-2.761-2.686-5-6-5s-6 2.239-6 5Z"/><path stroke-width="1.5" d="M17.873 11.249Q18 10.639 18 10c0-3.866-3.582-7-8-7s-8 3.134-8 7c0 1.112.297 2.164.824 3.098c.147.26.196.567.108.853L2 17l3.914-.76c.208-.041.422-.013.617.07a9 9 0 0 0 3.589.69"/></g></svg>
                        </div>
                        <div class="payment-info">
                            <h3>微信支付</h3>
                            <p>扫码支付</p>
                        </div>
                    </div>
                    <div class="payment-qr">
                        <img src="images/weixin.avif" alt="微信支付二维码">
                    </div>
                </div>
            </div>
        </div>

        <!-- Support Options Section -->
        <div class="section">
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                    <polyline points="16 6 12 2 8 6"/>
                    <line x1="12" y1="2" x2="12" y2="15"/>
                </svg>
                其他支持方式
            </h2>
            <div class="support-list">
                <div class="support-item">
                    <svg class="support-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    <div class="support-content">
                        <h4>分享推荐</h4>
                        <p>将我的博客分享给更多朋友</p>
                    </div>
                </div>
                <div class="support-item">
                    <svg class="support-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                    <div class="support-content">
                        <h4>留言互动</h4>
                        <p>在文章下方留下您的想法</p>
                    </div>
                </div>
                <div class="support-item">
                    <svg class="support-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    <div class="support-content">
                        <h4>关注订阅</h4>
                        <p>订阅RSS或关注社交媒体</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sponsors Section -->
        <div class="section">
            <h2 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                已赞助的小伙伴
            </h2>
            <div class="link-submit-info">
                <p>如果您已赞助，并且想加入赞助名单，<a href="https://github.com/Kemeow0815/sponsors/blob/main/data/sponsors/sponsors.json" target="_blank">请点击这里提交 PR</a></p>
            </div>
            <div id="sponsorList" class="sponsor-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.querySelector('.moon-icon');
        const sunIcon = document.querySelector('.sun-icon');
        const html = document.documentElement;

        // Check for saved theme preference or default to dark mode
        const currentTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            } else {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
        }

        // Load Sponsors
        async function loadSponsors() {
            const sponsorList = document.getElementById('sponsorList');
            
            try {
                const response = await fetch('data/sponsors/sponsors.json');
                
                if (!response.ok) {
                    sponsorList.innerHTML = '<div class="error">加载赞助者数据失败</div>';
                    return;
                }
                
                const data = await response.json();
                const sponsors = data.sponsors || [];
                
                // Sort by date (newest first)
                sponsors.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                renderSponsors(sponsors);
            } catch (error) {
                console.error('Error loading sponsors:', error);
                sponsorList.innerHTML = '<div class="error">加载赞助者数据失败</div>';
            }
        }

        function renderSponsors(sponsors) {
            const sponsorList = document.getElementById('sponsorList');
            
            if (sponsors.length === 0) {
                sponsorList.innerHTML = '<div class="loading">暂无赞助者数据</div>';
                return;
            }
            
            sponsorList.innerHTML = sponsors.map(sponsor => `
                <div class="sponsor-item">
                    <div class="sponsor-avatar">
                        ${sponsor.avatar 
                            ? `<img src="${sponsor.avatar}" alt="${sponsor.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<svg class=\\'default-avatar\\' xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><path d=\\'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\\'/><circle cx=\\'12\\' cy=\\'7\\' r=\\'4\\'/></svg>'">`
                            : `<svg class="default-avatar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
                        }
                    </div>
                    <div class="sponsor-info">
                        <div class="sponsor-name">${escapeHtml(sponsor.name)}</div>
                        <div class="sponsor-date">${escapeHtml(sponsor.date)}</div>
                        ${sponsor.url ? `<div class="sponsor-url"><a href="${escapeHtml(sponsor.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(sponsor.url)}</a></div>` : ''}
                    </div>
                    <div class="sponsor-amount">${escapeHtml(sponsor.amount)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load sponsors when page loads
        document.addEventListener('DOMContentLoaded', loadSponsors);
    </script>
    <script src="js/lightbox.js"></script>
</body>
</html>
